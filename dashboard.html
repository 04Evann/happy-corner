<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Corner | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .dashboard-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
        }
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .greeting {
            font-size: 32px;
            font-weight: 900;
        }
        .logout-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }
        .logout-btn:hover {
            background: #e74c3c;
            color: white;
            border-color: #e74c3c;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: var(--shadow-sm);
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }
        .stat-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
            background: var(--hp-pink);
        }
        .stat-card.debt::before { background: #e74c3c; }
        .stat-card.points::before { background: #f1c40f; }

        .stat-title { font-size: 16px; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 38px; font-weight: 900; color: var(--text-color); }
        .stat-subtitle { font-size: 14px; color: var(--text-muted); }

        .history-section {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 25px;
        }
        .section-title { font-size: 22px; font-weight: 900; margin-bottom: 20px; color: var(--text-color); }
        
        .history-list { display: flex; flex-direction: column; gap: 15px; }
        .history-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; background: var(--input-bg); border-radius: 14px;
            border: 1px solid var(--border-color);
        }
        .history-info strong { display: block; font-size: 16px; margin-bottom: 5px; }
        .history-info span { font-size: 13px; color: var(--text-muted); }
        .history-amount { font-weight: 900; font-size: 18px; }
        .amount-positive { color: #2ecc71; } /* Pagos o puntos ganados */
        .amount-negative { color: #e74c3c; } /* Deuda adquirida */

        .loading-state { text-align: center; padding: 40px; color: var(--text-muted); font-style: italic; }
    </style>
</head>
<body data-theme="dark">

    <header>
        <a href="/index" class="logo"><img src="loguito.png" alt="HappyCorner" class="logo-img"></a>
        <nav class="nav-desktop">
            <a href="/index">Inicio</a>
            <a href="/catalogo">Catálogo</a>
            <a href="/order">HappyOrder</a>
        </nav>
        <div style="display:flex; align-items:center; gap:10px;">
            <button class="theme-toggle" onclick="toggleTheme()" title="Night Mode"><span id="theme-icon">🌙</span></button>
        </div>
    </header>

    <div class="dashboard-container" id="dashboardContent" style="display: none;">
        <div class="header-section">
            <div class="greeting">Hola, <span id="userName" style="color: var(--hp-pink);">Estudiante</span> 👋</div>
            <button class="logout-btn" id="logoutBtn">Cerrar Sesión</button>
        </div>

        <div class="stats-grid">
            <!-- Deuda -->
            <div class="stat-card debt">
                <div class="stat-title">Deuda Activa</div>
                <div class="stat-value" id="debtValue">$--</div>
                <div class="stat-subtitle">A pagar en caja</div>
            </div>

            <!-- Puntos Loyverse -->
            <div class="stat-card points">
                <div class="stat-title">HappyPuntos</div>
                <div class="stat-value" id="pointsValue">--</div>
                <div class="stat-subtitle">Equivalen a dinero en tienda</div>
            </div>
        </div>

        <div class="history-section">
            <div class="section-title">Últimos Movimientos</div>
            <div class="history-list" id="historyList">
                <div class="loading-state">Cargando historial...</div>
            </div>
        </div>
    </div>

    <div class="loading-state" id="globalLoading" style="margin-top: 100px;">
        <div class="spinner-border" style="width: 3rem; height: 3rem; border-color: var(--hp-pink); border-right-color: transparent;"></div>
        <p style="margin-top: 20px;">Cargando tu cuenta...</p>
    </div>

    <!-- Script de lógica -->
    <script type="module">
        import { initPromise, auth, db, doc, getDoc, signOut, onAuthStateChanged } from './firebase-auth.js';
        // Asume que también tienes una función para obtener colecciones, pero por ahora mostramos mock history o lo que traiga Loyverse

        const dashboardContent = document.getElementById('dashboardContent');
        const globalLoading = document.getElementById('globalLoading');
        
        initPromise.then(() => {
            onAuthStateChanged(auth, async (user) => {
                if (!user) {
                    window.location.href = '/login.html';
                    return;
                }

                document.getElementById('userName').innerText = user.displayName.split(' ')[0];

                try {
                    // Obtener datos de Firestore
                    const userRef = doc(db, 'users', user.uid);
                    const userSnap = await getDoc(userRef);

                    if (userSnap.exists()) {
                        const userData = userSnap.data();
                        
                        if (!userData.loyalty_code) {
                            window.location.href = '/onboarding.html';
                            return;
                        }

                        // Mostrar Deuda
                        document.getElementById('debtValue').innerText = `$${userData.current_debt.toLocaleString()}`;

                        // Obtener HappyPuntos desde Loyverse API
                        fetchPoints(userData.loyalty_code);
                        
                        // Renderizar historial desde Firestore
                        renderHistory(userData.transactions || []); 

                        globalLoading.style.display = 'none';
                        dashboardContent.style.display = 'block';
                    }
                } catch (error) {
                    console.error("Error cargando dashboard:", error);
                    alert("Hubo un error cargando tus datos.");
                }
            });
        });

        async function fetchPoints(loyaltyCode) {
            try {
                const res = await fetch(`/api/getPoints?codigo=${loyaltyCode}`);
                if (!res.ok) throw new Error("Error fetching points");
                const data = await res.json();
                
                document.getElementById('pointsValue').innerText = data.puntos || 0;
            } catch (error) {
                console.error("Error Loyverse:", error);
                document.getElementById('pointsValue').innerText = "N/A";
            }
        }

        function renderHistory(transactions) {
            const historyList = document.getElementById('historyList');
            
            if (!transactions || transactions.length === 0) {
                historyList.innerHTML = `
                    <div class="empty-state" style="text-align:center; padding: 20px; color: var(--text-muted);">
                        No hay movimientos recientes en tu cuenta.
                    </div>
                `;
                return;
            }

            // Ordenar por fecha descendente (más recientes primero)
            const sorted = transactions.sort((a, b) => new Date(b.date) - new Date(a.date));

            historyList.innerHTML = '';
            sorted.forEach(tx => {
                const dateObj = new Date(tx.date);
                const dateString = dateObj.toLocaleDateString('es-CO', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                
                // Si amount > 0, es deuda o gasto. Si < 0, es abono/pago.
                const isAbono = tx.amount < 0;
                const signClass = isAbono ? 'amount-positive' : 'amount-negative';
                const signPrefix = isAbono ? '+' : '-';
                
                historyList.innerHTML += `
                    <div class="history-item">
                        <div class="history-info">
                            <strong>${tx.description}</strong>
                            <span>${dateString}</span>
                        </div>
                        <div class="history-amount ${signClass}">
                            ${signPrefix}$${Math.abs(tx.amount).toLocaleString()}
                        </div>
                    </div>
                `;
            });
        }

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await signOut(auth);
            window.location.href = '/index';
        });

        // Theme Toggle (Simplified for dashboard)
        let isDark = true;
        window.toggleTheme = function() {
            isDark = !isDark;
            const themeBtn = document.getElementById('theme-icon');
            if (isDark) { document.documentElement.setAttribute('data-theme', 'dark'); themeBtn.innerText = '☀️'; }
            else { document.documentElement.removeAttribute('data-theme'); themeBtn.innerText = '🌙'; }
        }
    </script>
</body>
</html>
