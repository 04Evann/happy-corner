<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Página No Encontrada | Happy Corner</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .error-container {
            text-align: center;
            padding: 80px 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .error-code {
            font-size: 150px;
            font-weight: 800;
            background: var(--hp-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            margin-bottom: 20px;
        }

        .error-title {
            font-size: 28px;
            font-weight: 800;
            color: var(--text-color);
            margin-bottom: 15px;
        }

        .error-desc {
            font-size: 16px;
            color: var(--text-muted);
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btnPrimary {
            display: inline-block;
            border: none;
            background: var(--hp-gradient);
            color: white;
            font-weight: 800;
            padding: 14px 28px;
            border-radius: 14px;
            cursor: pointer;
            text-decoration: none;
            font-size: 15px;
            box-shadow: 0 4px 15px var(--hp-pink-glow);
            transition: 0.3s;
        }

        .btnPrimary:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px var(--hp-pink-glow);
        }
    </style>
</head>
<body>
    <header>
        <a href="/index" class="logo">
            <img src="loguito.png" alt="HappyCorner" class="logo-img">
        </a>
        <nav class="header-nav nav-desktop">
            <a href="/index" class="nav-btn">Inicio</a>
            <a href="/catalogo" class="nav-btn">Catálogo</a>
            <a href="/order" class="nav-btn">HappyOrder</a>
            <a href="/track" class="nav-btn">Rastrear Pedido</a>
            <a href="/terminos" class="nav-btn">Términos</a>
        </nav>
        <div style="display:flex; align-items:center; gap:10px;">
            <button class="theme-toggle" onclick="toggleTheme()" title="Night Mode">
                <span id="theme-icon">🌙</span>
            </button>
            <div class="menu-btn" id="menuBtn">
                <span></span><span></span><span></span>
            </div>
        </div>
    </header>

    <div class="overlay" id="overlay"></div>
    <nav class="side-menu" id="sideMenu">
        <a href="/index">Inicio</a>
        <a href="/catalogo">Catálogo</a>
        <a href="/order">HappyOrder</a>
        <a href="/loyalty">LoyaltyCorner</a>
        <a href="/track">Rastrear Pedido</a>
        <a href="/terminos">Términos</a>
        <a href="/wallet">Happy Passes</a>
    </nav>

    <div class="page showcase-container">
        <div class="error-container">
            <div class="error-code">404</div>
            <h1 class="error-title">tan bobo se perdio JAAAA JAAA BABOSITO LOL</h1>
            <p class="error-desc">Parece que la página que estás buscando no existe, ha sido movida, o marian se la comió.</p>
            <a href="/index" class="btnPrimary">Volver al Inicio</a>
        </div>
    </div>

    <script>
        let isDark = false;
        function toggleTheme() {
            isDark = !isDark;
            const themeBtn = document.getElementById('theme-icon');
            if (isDark) {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeBtn.innerText = '☀️';
            } else {
                document.documentElement.removeAttribute('data-theme');
                themeBtn.innerText = '🌙';
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            const hour = new Date().getHours();
            if (hour >= 18 || hour < 6) toggleTheme();
        });

        const menuBtn = document.getElementById('menuBtn');
        const sideMenu = document.getElementById('sideMenu');
        const overlay = document.getElementById('overlay');
        menuBtn.onclick = () => { sideMenu.classList.toggle('active'); overlay.classList.toggle('active'); };
        overlay.onclick = () => { sideMenu.classList.remove('active'); overlay.classList.remove('active'); };
    </script>

    <a href="https://wa.me/573112871046" target="_blank" class="wa-fixed">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
    </a>

</body>
</html>
