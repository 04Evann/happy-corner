<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HappyDeudas | Manager Privado</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css?v=5">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .admin-box {
            max-width: 800px;
            margin: 40px auto;
            text-align: center;
            padding: 20px;
        }
        .debt-list {
            text-align: left;
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .debt-item {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .debt-info h3 { margin-bottom: 5px; color: var(--text-color); font-size: 18px; text-transform: capitalize; }
        .debt-info p { color: var(--text-muted); font-size: 14px; }
        .debt-amount { font-size: 22px; font-weight: 900; color: #e74c3c; }
        .debt-actions { display: flex; gap: 10px; }
        .btn-action {
            background: rgba(255, 255, 255, 0.1); border: 1px solid var(--border-color);
            color: var(--text-color); padding: 8px 15px; border-radius: 8px; cursor: pointer;
            font-weight: 700; transition: 0.3s;
        }
        .btn-action:hover { background: var(--hp-pink); color: white; border-color: var(--hp-pink); }
        .empty-state { text-align: center; padding: 40px 20px; color: var(--hp-pink); font-weight: 700; }
        .search-bar {
            width: 100%; padding: 15px; border-radius: 14px; border: 1px solid var(--border-color);
            background: var(--input-bg); color: var(--text-color); margin-bottom: 20px; font-size: 16px;
        }
    </style>
</head>
<body data-theme="dark">

    <header>
        <a href="/" class="logo">
            <img src="/loguito.png" alt="HappyCorner" class="logo-img">
        </a>
    </header>

    <div class="admin-box">
        <div class="page-title">🔥 HappyDeudas</div>
        <p class="section-subtitle">Panel Financiero Privado</p>

        <div class="checkout-box" id="login-section">
            <p style="margin-bottom: 15px; font-weight: 700;">Acceso exclusivo para administradores.</p>
            <button class="btn-add" id="adminLoginBtn">🔐 INICIAR SESIÓN</button>
        </div>

        <div id="data-section" style="display: none;">
            <input type="text" id="searchInput" class="search-bar" placeholder="🔍 Buscar estudiante por nombre o correo...">
            
            <div class="debt-list" id="deudores-container">
                <div class="spinner-border">Cargando datos...</div>
            </div>
        </div>
    </div>

    <!-- SCRIPT LOGIC -->
    <script type="module">
        import { initPromise, auth, db, provider, signInWithPopup, onAuthStateChanged } from '/firebase-auth.js';
        import { collection, getDocs, doc, updateDoc, increment, arrayUnion } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        let allUsers = [];

        // 1. Escuchar autenticación
        initPromise.then(() => {
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    // TODO: En producción, verifica que el user.email sea el tuyo antes de mostrar datos.
                    document.getElementById('login-section').style.display = 'none';
                    document.getElementById('data-section').style.display = 'block';
                    await loadDebts();
                } else {
                    document.getElementById('login-section').style.display = 'block';
                    document.getElementById('data-section').style.display = 'none';
                }
            });
        });

        // 2. Login
        document.getElementById('adminLoginBtn').addEventListener('click', async () => {
            try { await signInWithPopup(auth, provider); } 
            catch (e) { Swal.fire("Error", "No se pudo iniciar sesión", "error"); }
        });

        // 3. Cargar todos los usuarios
        async function loadDebts() {
            const container = document.getElementById('deudores-container');
            container.innerHTML = '<div class="spinner-border">Cargando...</div>';
            
            try {
                const querySnapshot = await getDocs(collection(db, "users"));
                allUsers = [];
                querySnapshot.forEach((doc) => {
                    allUsers.push({ id: doc.id, ...doc.data() });
                });
                renderUsers(allUsers);
            } catch(e) {
                console.error(e);
                container.innerHTML = `<div class="empty-state">Error cargando datos. ¿Permisos de Firestore?</div>`;
            }
        }

        // 4. Renderizar lista
        function renderUsers(users) {
            const container = document.getElementById('deudores-container');
            container.innerHTML = '';

            // Solo mostrar los que tienen deuda, o todos si se busca
            const query = document.getElementById('searchInput').value.toLowerCase();
            let filtered = users.filter(u => {
                const nameMatch = u.name?.toLowerCase().includes(query) || false;
                const emailMatch = u.email?.toLowerCase().includes(query) || false;
                return nameMatch || emailMatch;
            });

            // Si no hay búsqueda, ordenar por los que tienen más deuda primero
            if (!query) {
                filtered = filtered.sort((a, b) => (b.current_debt || 0) - (a.current_debt || 0));
            }

            if (filtered.length === 0) {
                container.innerHTML = `<div class="empty-state">No se encontraron estudiantes.</div>`;
                return;
            }

            filtered.forEach(user => {
                const deuda = user.current_debt || 0;
                container.innerHTML += `
                    <div class="debt-item">
                        <div class="debt-info">
                            <h3>${user.name}</h3>
                            <p>${user.email} | Loyverse: ${user.loyalty_code || 'No vinculado'}</p>
                        </div>
                        <div style="display:flex; align-items:center; gap:20px;">
                            <div class="debt-amount">$${deuda.toLocaleString()}</div>
                            <div class="debt-actions">
                                <button class="btn-action" onclick="modificarDeuda('${user.id}', '${user.name}', 'abonar')">💰 Abonar</button>
                                <button class="btn-action" onclick="modificarDeuda('${user.id}', '${user.name}', 'fiar')">🍔 Fiar</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        document.getElementById('searchInput').addEventListener('input', () => renderUsers(allUsers));

        // 5. Modificar deuda global (añadir a ventana window para onclick)
        window.modificarDeuda = async function(userId, userName, tipo) {
            const esAbono = tipo === 'abonar';
            const { value: monto } = await Swal.fire({
                title: esAbono ? 'Abonar a Deuda' : 'Añadir Nueva Deuda',
                text: \`Estudiante: \${userName}\`,
                input: 'number',
                inputPlaceholder: 'Ingresa el monto en $',
                showCancelButton: true,
                confirmButtonText: 'Confirmar',
                background: 'var(--surface-color)', color: 'var(--text-color)'
            });

            if (monto && Number(monto) > 0) {
                try {
                    const parsedMonto = Number(monto);
                    const diff = esAbono ? -parsedMonto : parsedMonto;
                    const desc = esAbono ? 'Abono en efectivo/transferencia' : 'Compra a crédito en tienda';
                    
                    const userRef = doc(db, 'users', userId);
                    
                    // Actualizamos la deuda actual y añadimos el registro al historial en un solo query
                    await updateDoc(userRef, {
                        current_debt: increment(diff),
                        transactions: arrayUnion({
                            date: new Date().toISOString(),
                            amount: diff, // Negativo si abonó, Positivo si es deuda nueva
                            description: desc
                        })
                    });

                    Swal.fire("Éxito", "Deuda actualizada", "success");
                    await loadDebts(); // Recargar datos
                } catch(e) {
                    console.error(e);
                    Swal.fire("Error", "No se pudo actualizar la deuda", "error");
                }
            }
        }
    </script>
</body>
</html>
