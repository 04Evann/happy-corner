<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Confirmación de Pre-orden | Happy Corner</title>
    <!-- Fonts and CSS -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=4">
    <!-- SweetAlert2 + Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        .verify-container {
            max-width: 600px;
            margin: 40px auto;
            text-align: center;
            padding: 20px;
        }

        .verify-title {
            font-size: 26px;
            font-weight: 900;
            margin-bottom: 20px;
            color: var(--text-color);
        }

        .verify-label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 5px;
            margin-top: 15px;
            text-align: left;
        }

        .verify-value {
            font-size: 16px;
            font-weight: 700;
            color: var(--hp-pink);
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            padding: 14px;
            border-radius: 14px;
            display: block;
            text-align: left;
            word-break: break-first;
            width: 100%;
            box-sizing: border-box;
            transition: all 0.3s;
        }
        
        .verify-value:hover {
            border-color: var(--hp-pink);
            box-shadow: 0 0 0 4px var(--hp-pink-glow);
            transform: translateY(-2px);
        }

        .btn-confirm {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            margin-top: 25px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 8px 20px rgba(46, 204, 113, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-cancel {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            transition: transform 0.2s;
            box-shadow: 0 4px 10px rgba(231, 76, 60, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-confirm:hover { transform: scale(1.03); box-shadow: 0 12px 25px rgba(46, 204, 113, 0.6); }
        .btn-cancel:hover { transform: scale(1.03); box-shadow: 0 6px 15px rgba(231, 76, 60, 0.4); background: #c0392b; }
        .btn-confirm:active, .btn-cancel:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <header>
        <a href="/index" class="logo">
            <img src="loguito.png" alt="HappyCorner" class="logo-img">
        </a>
        <button class="theme-toggle" onclick="toggleTheme()" title="Night Mode">
            <span id="theme-icon">🌙</span>
        </button>
    </header>

    <div class="verify-container">
        <div class="section-tag" style="margin: 0 auto 20px auto; display: inline-block;">Portal de Pre-órdenes</div>
        <p class="section-subtitle">Bienvenido al portal seguro de tus pedidos programados.</p>

        <div class="checkout-box" id="main-card">
            <div class="verify-title">🛒 Detalle de tu Pedido</div>
            
            <div class="verify-label">Cliente</div>
            <div class="verify-value" id="disp-name">--</div>

            <div class="verify-label">Código de Orden</div>
            <div class="verify-value" style="color:var(--hp-orange);" id="disp-order">--</div>

            <div class="verify-label">Resumen de Compra</div>
            <div class="verify-value" style="color:var(--text-color);" id="disp-resumen">--</div>

            <div class="verify-label">Total a Pagar Mañana</div>
            <div class="verify-value" style="font-size: 24px; font-weight: 900; background: var(--bg-color); border: 2px dashed #2ecc71; color: #2ecc71; text-align: center;" id="disp-price">--</div>

            <button class="btn-confirm" onclick="verifyAction('confirmed', event)">
                <span>✅</span> CONFIRMAR Y LLEVAR EL DINERO MAÑANA
            </button>
            <button class="btn-cancel" onclick="verifyAction('cancelled', event)">
                <span>❌</span> CANCELAR Y DESHACER PEDIDO
            </button>
        </div>
    </div>

    <!-- SCRIPT LOGIC -->
    <script>
        // Tema Nocturno
        let isDark = false;
        function toggleTheme() {
            isDark = !isDark;
            const themeBtn = document.getElementById('theme-icon');
            if (isDark) {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeBtn.innerText = '☀️';
            } else {
                document.documentElement.removeAttribute('data-theme');
                themeBtn.innerText = '🌙';
            }
        }
        const hour = new Date().getHours();
        if (hour >= 18 || hour < 6) toggleTheme();

        const params = new URLSearchParams(window.location.search);
        let uNombre = 'Cliente';
        let uOrder = 'h-00000';
        let uResumen = 'Producto (No especificado)';
        let uPrecio = '$0';
        let uWa = '';

        const token = params.get('auth');
        if (token) {
            try {
                const decoded = atob(decodeURIComponent(token));
                const data = JSON.parse(decoded);
                uNombre = data.n || uNombre;
                uOrder = data.o || uOrder;
                uPrecio = data.p || uPrecio;
                uWa = data.w || uWa;
                uResumen = data.res || uResumen;
            } catch (e) {
                console.error("Link corrupto:", e);
                Swal.fire({
                    icon: 'error',
                    title: 'Error de Enlace',
                    text: 'El código de seguridad del enlace está corrupto o alterado.',
                    background: 'var(--surface-color)', color: 'var(--text-color)'
                });
            }
        } else {
            // Fallback por si usan el enlace viejo
            uNombre = params.get('n') || uNombre;
            uOrder = params.get('o') || uOrder;
            uResumen = params.get('res') || uResumen;
            uPrecio = params.get('p') || uPrecio;
            uWa = params.get('w') || uWa;
        }

        document.getElementById('disp-name').innerText = uNombre;
        document.getElementById('disp-order').innerText = uOrder;
        document.getElementById('disp-resumen').innerText = uResumen;
        document.getElementById('disp-price').innerText = uPrecio;

        async function verifyAction(status, event) {
            const btn = event.currentTarget;
            btn.style.transform = 'scale(0.9)';
            setTimeout(() => btn.style.transform = '', 200);

            // Confirm Dialog
            const text = status === 'confirmed' 
                ? "¿Seguro que deseas confirmar tu pre-orden de mañana y tener el dinero listo en físico/transferencia?"
                : "¿Estás COMPLETAMENTE SEGURO de cancelar tu pedido? Esta acción no se puede deshacer.";

            const result = await Swal.fire({
                title: status === 'confirmed' ? "¡Último paso!" : "⚠️ Cancelación",
                text: text,
                icon: status === 'confirmed' ? 'question' : 'warning',
                showCancelButton: true,
                confirmButtonColor: status === 'confirmed' ? '#2ecc71' : '#e74c3c',
                cancelButtonColor: 'var(--input-bg)',
                confirmButtonText: status === 'confirmed' ? 'Sí, confirmar pre-orden' : 'Sí, cancelar pedido',
                cancelButtonText: '<span style="color:var(--text-color)">Regresar</span>',
                background: 'var(--surface-color)', color: 'var(--text-color)'
            });

            if (!result.isConfirmed) return;

            // Trigger Animation and Show Loading
            if (status === 'confirmed') {
                try {
                    confetti({
                        particleCount: 100, spread: 70, origin: { y: 0.6 },
                        colors: ['#2ecc71', '#ff5299', '#ff9d5c']
                    });
                } catch(e) {}
            }

            Swal.fire({
                title: 'Procesando...',
                html: 'Avisando al sistema interno...',
                allowOutsideClick: false,
                background: 'var(--surface-color)', color: 'var(--text-color)',
                didOpen: () => {
                    Swal.showLoading();
                }
            });

            try {
                // Siempre usar enlace de vercel para evitar errores de CORS/Paths
                const res = await fetch('https://happy-corner.vercel.app/api/verifyPreorder', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        orderId: uOrder,
                        nombre: uNombre,
                        resumen: uResumen,
                        status: status,
                        whatsapp: uWa
                    })
                });

                const data = await res.json();
                
                if (data.ok) {
                    Swal.fire({
                        icon: status === 'confirmed' ? 'success' : 'info',
                        title: status === 'confirmed' ? '¡Confirmado Exitosamente!' : 'Pedido Cancelado',
                        text: status === 'confirmed' 
                            ? 'Muchas gracias. La información se envió a la tienda.' 
                            : 'El pedido fue dado de baja del sistema.',
                        confirmButtonText: 'Aceptar',
                        confirmButtonColor: status === 'confirmed' ? '#2ecc71' : '#e74c3c',
                        background: 'var(--surface-color)', color: 'var(--text-color)'
                    }).then(() => {
                        window.location.href = '/index.html';
                    });
                } else {
                    Swal.fire({
                        title: 'Error', text: 'Instalación remota arrojó un error', 
                        icon: 'error', background: 'var(--surface-color)', color: 'var(--text-color)'
                    });
                }
            } catch (error) {
                Swal.fire({
                    title: 'Error', text: 'Inténtalo de nuevo, falla de conexión.', 
                    icon: 'error', background: 'var(--surface-color)', color: 'var(--text-color)'
                });
            }
        }
    </script>
</body>
</html>
