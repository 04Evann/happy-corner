<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Corner - Verificar Pedido</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            background-color: var(--background-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .verify-card {
            background: var(--surface-color);
            border-radius: 20px;
            padding: 30px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
        }

        .status-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .status-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .status-text {
            color: var(--text-muted);
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .order-details {
            text-align: left;
            background: var(--input-bg);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .detail-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .detail-label {
            color: var(--text-muted);
            font-size: 14px;
        }

        .detail-value {
            font-weight: 700;
        }

        .btn-home {
            display: inline-block;
            background: var(--hp-gradient);
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 700;
            transition: opacity 0.2s;
        }

        .btn-home:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>
    <div class="verify-card" id="verifyCard">
        <div class="status-icon">⏳</div>
        <div class="status-title">Verificando...</div>
        <div class="status-text">Consultando la base de datos de Happy Corner.</div>
    </div>

    <script type="module">
        import { initPromise, db, doc, getDoc } from './firebase-auth.js';

        // Tema Nocturno automatico
        const hour = new Date().getHours();
        if (hour >= 18 || hour < 6) {
            document.documentElement.setAttribute('data-theme', 'dark');
        }

        async function init() {
            const params = new URLSearchParams(window.location.search);
            const orderId = params.get('order');
            const card = document.getElementById('verifyCard');

            if (!orderId) {
                showError("No se proporcionó un código de pedido válido en el enlace.");
                return;
            }

            try {
                const docRef = doc(db, 'orders', orderId);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    showSuccess(data, orderId);
                } else {
                    showError("Este código no existe en el sistema. El recibo podría ser falso.");
                }
            } catch (error) {
                console.error("Error al verificar:", error);
                showError("Hubo un error al conectar con el servidor.");
            }
        }

        function showSuccess(data, orderId) {
            const card = document.getElementById('verifyCard');
            const date = data.timestamp ? new Date(data.timestamp.toMillis()).toLocaleString('es-CO') : 'N/A';

            const statusMap = {
                'pending': '⏳ Pendiente',
                'paid': '✅ Pagado',
                'cancelled': '❌ Cancelado',
                'ready': '🛍️ Listo para entregar',
                'delivered': '🏁 Entregado'
            };
            const statusStr = statusMap[data.status] || data.status;

            card.innerHTML = `
                <div class="status-icon">✅</div>
                <div class="status-title" style="color: #4ade80;">Pedido Legítimo</div>
                <div class="status-text">El recibo escaneado es auténtico y existe en nuestro sistema.</div>
                
                <div class="order-details">
                    <div class="detail-row">
                        <span class="detail-label">Orden</span>
                        <span class="detail-value" style="color: var(--hp-pink);">${orderId}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Cliente</span>
                        <span class="detail-value">${data.customerName || 'N/A'}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Resumen</span>
                        <span class="detail-value" style="text-align:right; max-width:60%;">${data.resumen || 'N/A'}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Total</span>
                        <span class="detail-value">$${(data.total || 0).toLocaleString('es-CO')}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Estado</span>
                        <span class="detail-value">${statusStr}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Fecha</span>
                        <span class="detail-value" style="font-size:12px;">${date}</span>
                    </div>
                </div>

                <a href="/index" class="btn-home">Volver al inicio</a>
            `;
        }

        function showError(message) {
            const card = document.getElementById('verifyCard');
            card.innerHTML = `
                <div class="status-icon">❌</div>
                <div class="status-title" style="color: #ef4444;">Pedido No Encontrado</div>
                <div class="status-text" style="color: #fca5a5;">${message}</div>
                <a href="/index" class="btn-home">Volver al inicio</a>
            `;
        }

        initPromise.then(init);
    </script>
</body>

</html>
