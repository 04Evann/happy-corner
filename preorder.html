<script>
    // TU STOCK REAL ACTUALIZADO
    const productos = [
        { id: 1, nombre: "Cookie Chips", precio: 5000, emoji: "🍪", stock: 4 },
        { id: 2, nombre: "Galleta Red Velvet", precio: 6000, emoji: "🔴", stock: 4 },
        { id: 3, nombre: "Brownie Avellana (Choc)", precio: 5000, emoji: "🌰", stock: 4 },
        { id: 4, nombre: "Galleta Choco Arequipe", precio: 6000, emoji: "🍫", stock: 3 },
        { id: 5, nombre: "Brownie Arequipe", precio: 5000, emoji: "🍯", stock: 3 }
    ];

    let carrito = {};

    function render() {
        const grid = document.getElementById('product-list');
        grid.innerHTML = productos.map(p => `
            <div class="card ${p.stock === 0 ? 'agotado' : ''}">
                <div class="img-placeholder">${p.emoji}</div>
                <div class="product-name">${p.nombre}</div>
                <div style="font-size: 10px; color: #ff5299; font-weight: 700;">
                    ${p.stock > 0 ? `${p.stock} DISPONIBLES` : '¡AGOTADO!'}
                </div>
                <div class="price">$${p.precio.toLocaleString()}</div>
                <div class="qty-controls">
                    <button class="qty-btn" onclick="updateQty(${p.id}, -1)">-</button>
                    <span id="qty-${p.id}" style="font-weight:800; min-width: 20px;">0</span>
                    <button class="qty-btn" 
                            id="add-${p.id}" 
                            onclick="updateQty(${p.id}, 1)" 
                            ${p.stock === 0 ? 'disabled' : ''}>+</button>
                </div>
            </div>
        `).join('');
    }

    function updateQty(id, val) {
        const p = productos.find(prod => prod.id === id);
        const actual = carrito[id] || 0;
        const nuevo = actual + val;

        // Validar que no baje de 0 y no supere el STOCK
        if (nuevo >= 0 && nuevo <= p.stock) {
            carrito[id] = nuevo;
            document.getElementById(`qty-${id}`).innerText = nuevo;
            
            // Bloquear/Desbloquear botón de + visualmente
            const btnAdd = document.getElementById(`add-${id}`);
            btnAdd.disabled = (nuevo === p.stock);
            if (nuevo === p.stock) {
                btnAdd.style.opacity = "0.3";
            } else {
                btnAdd.style.opacity = "1";
            }
        } else if (nuevo > p.stock) {
            alert(`¡Lo siento! Solo nos quedan ${p.stock} de ${p.nombre}`);
        }
        
        recalcularTotal();
    }

    function recalcularTotal() {
        let total = 0;
        productos.forEach(p => total += (carrito[p.id] || 0) * p.precio);
        document.getElementById('total-view').innerText = `$${total.toLocaleString()}`;
    }

    // ... (Mantén tu función procesarPedido() igual que antes)
</script>
