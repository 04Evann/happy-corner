<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pre-Order | Happy Corner</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Ajustes específicos para que el formulario no se pegue a los bordes */
        .preorder-container {
            padding-bottom: 120px; /* Espacio para el total flotante */
        }
        .form-section {
            background: white;
            margin: 15px;
            padding: 25px;
            border-radius: 25px;
            box-shadow: var(--shadow);
        }
        .form-section input {
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            border-radius: 15px;
            border: 1px solid #eee;
            background: #f9f9f9;
            font-family: 'Poppins', sans-serif;
            font-size: 16px;
            outline: none;
        }
        .form-section input:focus {
            border-color: #ff5299;
        }
        .footer-cart {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: white;
            padding: 20px 25px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }
    </style>
</head>
<body class="preorder-container">

    <header>
        <img src="Happylogo.png" class="logo-img" alt="Happy Corner Logo">
        <div class="nav-desktop">
            <a href="index.html">VOLVER AL INICIO</a>
        </div>
    </header>

    <div class="section-tag">🔥 PRE-ORDER FLASH</div>

    <div class="grid" id="product-list">
        </div>

    <div class="form-section">
        <h3 style="font-weight: 800; color: var(--text-dark);">¿A NOMBRE DE QUIÉN?</h3>
        <input type="text" id="cliente-nombre" placeholder="Escribe tu nombre...">
        <input type="tel" id="cliente-whatsapp" placeholder="Tu WhatsApp (ej: 310...)">
    </div>

    <div class="footer-cart">
        <div>
            <p style="font-size: 11px; font-weight: 700; color: #888; margin: 0;">TOTAL A PAGAR</p>
            <h2 id="total-view" style="color: #ff5299; font-weight: 800; margin: 0;">$0</h2>
        </div>
        <button class="add-btn" id="submit-btn" style="width: auto; padding: 15px 35px; border-radius: 20px;" onclick="procesarPedido()">
            ENVIAR PEDIDO 🚀
        </button>
    </div>

    <script>
        // Listado exacto de tus productos actuales
        const productos = [
            { id: 1, nombre: "Cookie Chips", precio: 5000, emoji: "🍪" },
            { id: 2, nombre: "Galleta Red Velvet", precio: 6000, emoji: "🔴" },
            { id: 3, nombre: "Brownie Avellana", precio: 5000, emoji: "🌰" },
            { id: 4, nombre: "Galleta Choco Arequipe", precio: 6000, emoji: "🍫" },
            { id: 5, nombre: "Brownie Arequipe", precio: 5000, emoji: "🍯" }
        ];

        let carrito = {};

        function render() {
            const grid = document.getElementById('product-list');
            grid.innerHTML = productos.map(p => `
                <div class="card">
                    <div class="img-placeholder">${p.emoji}</div>
                    <div class="product-name">${p.nombre}</div>
                    <div class="price">$${p.precio.toLocaleString()}</div>
                    <div class="qty-controls">
                        <button class="qty-btn" onclick="updateQty(${p.id}, -1)">-</button>
                        <span id="qty-${p.id}" style="font-weight:800; min-width: 20px;">0</span>
                        <button class="qty-btn" onclick="updateQty(${p.id}, 1)">+</button>
                    </div>
                </div>
            `).join('');
        }

        function updateQty(id, val) {
            carrito[id] = (carrito[id] || 0) + val;
            if (carrito[id] < 0) carrito[id] = 0;
            document.getElementById(`qty-${id}`).innerText = carrito[id];
            
            let total = 0;
            productos.forEach(p => total += (carrito[p.id] || 0) * p.precio);
            document.getElementById('total-view').innerText = `$${total.toLocaleString()}`;
        }

        async function procesarPedido() {
            const nombre = document.getElementById('cliente-nombre').value;
            const tel = document.getElementById('cliente-whatsapp').value;
            const btn = document.getElementById('submit-btn');

            // Validaciones básicas
            let items = productos.filter(p => carrito[p.id] > 0);
            if (!nombre || !tel || items.length === 0) {
                alert("Oye! Selecciona algo rico y pon tus datos. 😉");
                return;
            }

            btn.disabled = true;
            btn.innerText = "ESPERA...";

            const resumen = items.map(p => `${carrito[p.id]}x ${p.nombre}`).join(', ');
            const totalStr = document.getElementById('total-view').innerText;

            const data = {
                nombre: nombre,
                whatsapp: tel,
                total: totalStr,
                resumen: resumen,
                estado: "Nuevo"
            };

            try {
                // Envío a tu API que ya tiene la conexión a Supabase y Telegram
                const response = await fetch('https://happy-corner.vercel.app/api/getOrders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    alert("¡Listo! Recibimos tu pedido. Te llegará un Telegram y te contactaremos.");
                    // Redirigir a WhatsApp como respaldo
                    const text = `¡Hola! Soy ${nombre}, quiero mi pre-order: ${resumen}. Total: ${totalStr}`;
                    window.location.href = `https://wa.me/573000000000?text=${encodeURIComponent(text)}`; 
                } else {
                    throw new Error();
                }
            } catch (e) {
                alert("Error al conectar. Revisa tu internet e intenta de nuevo.");
                btn.disabled = false;
                btn.innerText = "ENVIAR PEDIDO 🚀";
            }
        }

        render();
    </script>
</body>
</html>
