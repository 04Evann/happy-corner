<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Happy Corner</title>
    <link rel="icon" href="/happyfavicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .redirect-box {
            max-width: 380px;
            margin: 100px auto;
            text-align: center;
            padding: 30px;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid var(--border-color);
            border-top-color: var(--hp-pink);
            border-radius: 50%;
            margin: 0 auto 20px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body data-theme="dark">
    <div class="redirect-box">
        <div class="spinner" id="spinner"></div>
        <div id="message" style="font-weight:700;">Redirigiendo...</div>
    </div>

    <script type="module">
        import { initPromise, db } from './firebase-auth.js';
        import { doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

        await initPromise;

        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const messageEl = document.getElementById('message');
        const spinnerEl = document.getElementById('spinner');

        if (!code) {
            spinnerEl.style.display = 'none';
            messageEl.textContent = 'Link inválido.';
        } else {
            try {
                const snap = await getDoc(doc(db, 'shortlinks', code));
                if (snap.exists() && snap.data().target) {
                    window.location.replace(snap.data().target);
                } else {
                    spinnerEl.style.display = 'none';
                    messageEl.textContent = 'Este link expiró o no es válido.';
                }
            } catch (e) {
                console.error('Error resolviendo link corto:', e);
                spinnerEl.style.display = 'none';
                messageEl.textContent = 'Ocurrió un error. Intenta de nuevo.';
            }
        }
    </script>
</body>
</html>
